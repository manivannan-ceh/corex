version: "3.9"

services:

  backend:
    build: ./backend
    container_name: apk-backend
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSLMODE=${DB_SSLMODE}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION_HOURS=${JWT_EXPIRATION_HOURS}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      - UPLOAD_DIR=/app/uploads
      - APP_URL=${APP_URL:-}
      - SERVER_PORT=8080
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - apk-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: apk-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - apk-network
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: apk-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - apk-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  uploads:

networks:
  apk-network:
    driver: bridge
